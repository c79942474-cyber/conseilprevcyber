<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mot de passe oublié — CONSEILPREV Cyber</title>
<link rel="stylesheet" href="/styles.css">
<style>
  .authwrap{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .authcard{width:100%;max-width:420px;background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:16px;padding:32px}
  .authcard h1{font-size:23px;margin-bottom:6px}.authcard .sub{color:var(--muted);font-size:14px;margin-bottom:22px}
  .msg{border-radius:9px;padding:11px 14px;font-size:13.5px;margin-bottom:16px;display:none}
  .msg.err{background:rgba(217,96,58,.12);border:1px solid rgba(217,96,58,.3);color:var(--terra);display:block}
  .msg.ok{background:rgba(52,211,153,.10);border:1px solid rgba(52,211,153,.3);color:var(--green);display:block}
  .authcard .btn-p{width:100%;text-align:center}.authlinks{margin-top:18px;font-size:13px;text-align:center}.authlinks a{color:var(--cyan)}
</style>
</head>
<body>
  <header><div class="wrap nav"><div class="brand"><a href="/">CONSEILPREV</a><span class="tag">Cyber</span></div>
    <div class="spacer"></div><nav class="links"><a href="/connexion">← Connexion</a></nav></div></header>
  <main class="authwrap">
    <div class="authcard">
      <h1>Mot de passe oublié</h1>
      <p class="sub">Saisissez votre email : si un compte existe, vous recevrez un lien de réinitialisation.</p>
      <div id="msg" class="msg"></div>
      <form id="f" class="form" style="max-width:none;background:none;border:none;padding:0">
        <div class="field"><label>Email</label><input id="email" type="email" autocomplete="email" required></div>
        <button class="btn btn-p" type="submit">Envoyer le lien</button>
      </form>
      <div class="authlinks"><a href="/connexion">Retour à la connexion</a></div>
    </div>
  </main>
  <script>
  document.getElementById('f').addEventListener('submit',function(e){
    e.preventDefault();var msg=document.getElementById('msg');
    msg.textContent='Envoi…';msg.className='msg ok';
    fetch('/api/auth/forgot',{method:'POST',headers:{'content-type':'application/json'},
      body:JSON.stringify({email:document.getElementById('email').value.trim()})})
      .then(function(r){return r.json();})
      .then(function(j){msg.textContent=j.message||'Si un compte existe, un email a été envoyé.';msg.className='msg ok';})
      .catch(function(){msg.textContent='Erreur réseau, réessayez.';msg.className='msg err';});
  });
  </script>
</body>
</html>
