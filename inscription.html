<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Créer un compte — CONSEILPREV Cyber</title>
<meta name="description" content="Demande d'accès à l'espace client CONSEILPREV Cyber (cockpit de supervision OT).">
<link rel="stylesheet" href="/styles.css">
<style>
  .authwrap{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .authcard{width:100%;max-width:460px;background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-radius:16px;padding:32px}
  .authcard h1{font-size:24px;margin-bottom:6px}
  .authcard .sub{color:var(--muted);font-size:14px;margin-bottom:22px}
  .msg{border-radius:9px;padding:11px 14px;font-size:13.5px;margin-bottom:16px;display:none}
  .msg.err{background:rgba(217,96,58,.12);border:1px solid rgba(217,96,58,.3);color:var(--terra);display:block}
  .msg.ok{background:rgba(52,211,153,.10);border:1px solid rgba(52,211,153,.3);color:var(--green);display:block}
  .authcard .btn-p{width:100%;text-align:center;margin-top:6px}
  .hint{color:var(--muted2);font-size:12px;margin-top:4px}
  .authlinks{margin-top:18px;font-size:13px;text-align:center}
  .authlinks a{color:var(--cyan)}
</style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <div class="brand"><a href="/">CONSEILPREV</a><span class="tag">Cyber</span></div>
      <div class="spacer"></div>
      <nav class="links"><a href="/">← Accueil</a><a href="/connexion">Connexion</a></nav>
    </div>
  </header>

  <main class="authwrap">
    <div class="authcard">
      <h1>Créer un compte</h1>
      <p class="sub">Demandez un accès au cockpit de supervision. Après confirmation de votre email, votre accès
        sera validé par notre équipe.</p>
      <div id="msg" class="msg"></div>
      <form id="f" class="form" style="max-width:none;background:none;border:none;padding:0">
        <div class="field"><label>Nom complet</label><input id="name" type="text" autocomplete="name" required></div>
        <div class="field"><label>Organisation</label><input id="org" type="text" autocomplete="organization"></div>
        <div class="field"><label>Email professionnel</label><input id="email" type="email" autocomplete="email" required></div>
        <div class="field"><label>Mot de passe</label><input id="password" type="password" autocomplete="new-password" required>
          <div class="hint">Au moins 10 caractères, avec lettres et chiffres.</div></div>
        <div class="field"><label>Vérification : <span id="capq">…</span></label><input id="captcha" type="text" inputmode="numeric" required></div>
        <button class="btn btn-p" type="submit">Envoyer ma demande</button>
      </form>
      <div class="authlinks">Déjà un compte&nbsp;? <a href="/connexion">Se connecter</a></div>
    </div>
  </main>

  <script>
  (function(){
    var msg=document.getElementById('msg');
    function show(t,cls){msg.textContent=t;msg.className='msg '+cls;}
    function loadCaptcha(){fetch('/api/auth/captcha').then(function(r){return r.json();})
      .then(function(j){document.getElementById('capq').textContent=j.question;});}
    loadCaptcha();
    document.getElementById('f').addEventListener('submit',function(e){
      e.preventDefault();
      show('Envoi…','ok');
      var body={name:document.getElementById('name').value.trim(),org:document.getElementById('org').value.trim(),
        email:document.getElementById('email').value.trim(),password:document.getElementById('password').value,
        captcha:document.getElementById('captcha').value.trim()};
      fetch('/api/auth/register',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify(body)})
        .then(function(r){return r.json();})
        .then(function(j){ if(j.ok){ document.getElementById('f').style.display='none';
            show('Demande enregistrée ✅ Vérifiez votre boîte mail (et les spams) pour confirmer votre email.','ok'); }
          else { show(j.error||'Erreur.','err'); loadCaptcha(); document.getElementById('captcha').value=''; } })
        .catch(function(){show('Erreur réseau, réessayez.','err');});
    });
  })();
  </script>
</body>
</html>
