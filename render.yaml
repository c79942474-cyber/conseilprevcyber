services:
  - type: web
    name: conseilprevcyber
    region: frankfurt
    env: python
    buildCommand: pip install -r requirements.txt
    # Worker à threads (gthread) : requis pour le flux SSE du cockpit (/api/stream),
    # qui maintient des connexions longues.
    startCommand: gunicorn -k gthread --threads 8 --timeout 120 app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Clé API Brevo (transactional email) — à renseigner dans le dashboard Render.
      # Sans elle, le formulaire de contact bascule sur un lien mailto.
      - key: BREVO_API_KEY
        sync: false
      # Jeton du flux temps réel du cockpit (protège POST /api/ingest).
      # Sans lui, l'ingestion est fermée et le cockpit reste en mode démo.
      - key: INGEST_TOKEN
        sync: false
      # Persistance (optionnel). Si défini, l'inventaire et l'historique sont
      # conservés dans PostgreSQL ; sinon l'état est en mémoire. Créer une base
      # Render Postgres et coller son URL interne ici.
      - key: DATABASE_URL
        sync: false
      # Haute disponibilité multi-instance (optionnel). Si défini, les événements
      # sont diffusés via Redis pub/sub à toutes les instances (fan-out SSE partagé).
      # Requiert aussi DATABASE_URL (état partagé). Sinon : une seule instance.
      - key: REDIS_URL
        sync: false
      # Instance PRIVÉE (optionnel). Définir ces deux variables place TOUT le
      # site derrière une authentification HTTP Basic (voir connectors/deploy/DEPLOY.md).
      # Laisser vide pour une instance publique (ex. la démo).
      - key: COCKPIT_AUTH_USER
        sync: false
      - key: COCKPIT_AUTH_PASSWORD
        sync: false
