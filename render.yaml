services:
  - type: web
    name: conseilprevcyber
    region: frankfurt
    env: python
    buildCommand: pip install -r requirements.txt
    # Worker à threads (gthread) : requis pour le flux SSE du cockpit (/api/stream),
    # qui maintient des connexions longues.
    startCommand: gunicorn -k gthread --threads 8 --timeout 120 app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Clé API Brevo (transactional email) — à renseigner dans le dashboard Render.
      # Sans elle, le formulaire de contact bascule sur un lien mailto.
      - key: BREVO_API_KEY
        sync: false
      # Jeton du flux temps réel du cockpit (protège POST /api/ingest).
      # Sans lui, l'ingestion est fermée et le cockpit reste en mode démo.
      - key: INGEST_TOKEN
        sync: false
      # Persistance (cockpit, base de connaissance RAG, historique des livrables,
      # comptes). L'URL interne est injectée AUTOMATIQUEMENT depuis la base
      # PostgreSQL déclarée plus bas (section « databases ») : rien à coller à la main.
      - key: DATABASE_URL
        fromDatabase:
          name: conseilprevcyber-db
          property: connectionString
      # Haute disponibilité multi-instance (optionnel). Si défini, les événements
      # sont diffusés via Redis pub/sub à toutes les instances (fan-out SSE partagé).
      # Requiert aussi DATABASE_URL (état partagé). Sinon : une seule instance.
      - key: REDIS_URL
        sync: false
      # Rétention de l'historique (optionnel, nécessite DATABASE_URL). Purge auto
      # des événements au-delà de N jours et/ou au-delà de N lignes.
      - key: EVENT_RETENTION_DAYS
        sync: false
      - key: EVENT_MAX_ROWS
        sync: false
      # Comptes (inscription + validation admin + connexion) — voir auth.py.
      # Clé de signature des sessions : générée automatiquement par Render.
      - key: FLASK_SECRET_KEY
        generateValue: true
      # Email qui reçoit les demandes d'accès à approuver (= compte admin).
      - key: ADMIN_EMAIL
        sync: false
      # Mot de passe initial du compte admin (créé au premier démarrage s'il
      # n'existe pas ; modifiable ensuite via « mot de passe oublié »).
      - key: ADMIN_PASSWORD
        sync: false
      # URL publique (liens des emails de confirmation / réinitialisation).
      - key: PUBLIC_BASE_URL
        sync: false
      # Assistant IA conversationnel (/assistant). Chaque clé active son modèle ;
      # sans clé, le modèle est signalé « non configuré » (l'app fonctionne quand même).
      # Claude (Anthropic) — https://console.anthropic.com/
      - key: ANTHROPIC_API_KEY
        sync: false
      # Mistral (fournisseur européen) — https://console.mistral.ai/
      - key: MISTRAL_API_KEY
        sync: false
      # (Optionnel) surcharge des modèles utilisés.
      - key: ANTHROPIC_MODEL
        sync: false
      - key: MISTRAL_MODEL
        sync: false
      # Modèle affiché par défaut dans le chat : « claude » ou « mistral ».
      # Non défini => « mistral » (fournisseur UE, cohérent RGPD). L'utilisateur
      # peut toujours basculer manuellement vers l'autre modèle dans l'interface.
      - key: ASSISTANT_DEFAULT_MODEL
        sync: false

# Base PostgreSQL managée — persistance de tout l'état applicatif : inventaire et
# historique du cockpit, base de connaissance RAG (documents + fragments indexés),
# historique des livrables et comptes. Provisionnée automatiquement par le blueprint ;
# son URL interne alimente DATABASE_URL (voir le service ci-dessus).
databases:
  - name: conseilprevcyber-db
    databaseName: conseilprevcyber
    user: conseilprevcyber
    region: frankfurt          # MÊME région que le service web (connexion interne)
    # Plan payant « basic-256mb » (~6 $/mois) : base persistante, sans expiration,
    # adaptée à la production. Ajustable ensuite (basic-1gb, basic-4gb…) selon le volume.
    plan: basic-256mb
    # PostgreSQL 16 : compatible pgvector (recherche sémantique) si MISTRAL_API_KEY est défini.
    postgresMajorVersion: "16"
    # Sécurité : aucune connexion externe autorisée — le site s'y connecte en interne.
    ipAllowList: []
