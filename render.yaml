services:
  - type: web
    name: conseilprevcyber
    region: frankfurt
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      # Clé API Brevo (transactional email) — à renseigner dans le dashboard Render.
      # Sans elle, le formulaire de contact bascule sur un lien mailto.
      - key: BREVO_API_KEY
        sync: false
