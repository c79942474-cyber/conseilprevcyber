<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Connexion — CONSEILPREV Cyber</title>
<meta name="description" content="Connexion à l'espace client CONSEILPREV Cyber (cockpit de supervision OT).">
<link rel="icon" href="/emblem.svg" type="image/svg+xml">
<link rel="stylesheet" href="/styles.css">
<style>
  .authwrap{min-height:calc(100vh - 64px);display:flex;align-items:center;justify-content:center;padding:40px 20px}
  .authcard{width:100%;max-width:420px;background:linear-gradient(180deg,var(--panel),var(--bg2));
    border:1px solid var(--line);border-radius:16px;padding:32px}
  .authcard h1{font-size:24px;margin-bottom:6px}
  .authcard .sub{color:var(--muted);font-size:14px;margin-bottom:24px}
  .msg{border-radius:9px;padding:11px 14px;font-size:13.5px;margin-bottom:16px;display:none}
  .msg.err{background:rgba(217,96,58,.12);border:1px solid rgba(217,96,58,.3);color:var(--terra);display:block}
  .msg.ok{background:rgba(52,211,153,.10);border:1px solid rgba(52,211,153,.3);color:var(--green);display:block}
  .authcard .btn-p{width:100%;text-align:center;margin-top:6px}
  .authlinks{margin-top:20px;display:flex;justify-content:space-between;font-size:13px}
  .authlinks a{color:var(--cyan)}
</style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <div class="brand"><a href="/" class="brand-link"><img src="/emblem.svg" class="brand-mark" width="30" height="30" alt="">CONSEILPREV</a><span class="tag">Cyber</span></div>
      <div class="spacer"></div>
      <nav class="links"><a href="/">← Accueil</a><a href="/demo">Démo</a>
<a href="/about">À propos</a>
<a href="/vos-projets" class="cta-alt">Vos projets</a></nav>
    </div>
  </header>

  <main class="authwrap">
    <div class="authcard">
      <h1>Connexion</h1>
      <p class="sub">Accédez à votre cockpit de supervision OT.</p>
      <div id="msg" class="msg"></div>
      <form id="f" class="form" style="max-width:none;background:none;border:none;padding:0">
        <div class="field"><label>Email <button type="button" class="tipi" data-tip="L'adresse de votre compte (email professionnel utilisé à l'inscription)." aria-label="Aide : quel email utiliser">i</button></label><input id="email" type="email" autocomplete="username" required></div>
        <div class="field"><label>Mot de passe <button type="button" class="tipi" data-tip="Connexion chiffrée. Après plusieurs essais infructueux, l'accès est temporairement bloqué." aria-label="Aide : sécurité du mot de passe">i</button></label><input id="password" type="password" autocomplete="current-password" required></div>
        <button class="btn btn-p" type="submit">Se connecter</button>
        <div class="secnote"><svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="10" width="16" height="10" rx="2"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path></svg>Connexion chiffrée · protection anti-bruteforce · session sécurisée.</div>
      </form>
      <div class="authlinks">
        <a href="/mot-de-passe-oublie">Mot de passe oublié&nbsp;?</a>
        <a href="/inscription">Créer un compte</a>
      </div>
    </div>
  </main>

  <script>
  (function(){
    var q=new URLSearchParams(location.search), msg=document.getElementById('msg');
    function show(t,cls){msg.textContent=t;msg.className='msg '+cls;}
    if(q.get('verifie'))show('Email confirmé. Votre accès sera actif après validation par notre équipe (vous recevrez un email).','ok');
    if(q.get('deconnecte'))show('Vous êtes déconnecté.','ok');
    var nextUrl=q.get('next')||'/demo';
    document.getElementById('f').addEventListener('submit',function(e){
      e.preventDefault();
      show('Connexion…','ok');
      fetch('/api/auth/login',{method:'POST',headers:{'content-type':'application/json'},
        body:JSON.stringify({email:document.getElementById('email').value.trim(),password:document.getElementById('password').value})})
        .then(function(r){return r.json().then(function(j){return {s:r.status,j:j};});})
        .then(function(o){ if(o.j.ok){ location.href=nextUrl; } else { show(o.j.error||'Échec de la connexion.','err'); } })
        .catch(function(){show('Erreur réseau, réessayez.','err');});
    });
  })();
  </script>
  <script src="/nav.js" defer></script>
</body>
</html>
