<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Administration des comptes — CONSEILPREV Cyber</title>
<link rel="stylesheet" href="/styles.css">
<style>
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:6px 0 22px}
  @media(max-width:820px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:16px 18px;position:relative;overflow:hidden}
  .stat::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--sc,linear-gradient(90deg,var(--cyan),var(--teal)))}
  .stat .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted2);margin-bottom:6px}
  .stat .val{font-size:26px;font-weight:800;line-height:1}
  .tblwrap{background:linear-gradient(180deg,var(--panel),var(--bg2));border:1px solid var(--line);border-radius:14px;padding:6px;overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:13.5px;min-width:760px}
  th{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted2);
    text-align:left;padding:12px 14px;border-bottom:1px solid var(--line)}
  td{padding:11px 14px;border-bottom:1px solid rgba(30,42,58,.55);color:var(--muted);vertical-align:middle}
  tr:last-child td{border-bottom:none}
  td .who{color:var(--ink);font-weight:600}
  td .sub{font-size:12px;color:var(--muted2)}
  .pill{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;
    border-radius:999px;padding:3px 10px;border:1px solid var(--line)}
  .pill.ok{color:var(--green);border-color:rgba(52,211,153,.4);background:rgba(52,211,153,.08)}
  .pill.wait{color:var(--amber);border-color:rgba(240,180,41,.4);background:rgba(240,180,41,.08)}
  .pill.off{color:var(--terra);border-color:rgba(217,96,58,.4);background:rgba(217,96,58,.08)}
  .pill.adm{color:var(--violet);border-color:rgba(139,124,246,.4);background:rgba(139,124,246,.08)}
  .act{display:flex;gap:6px;flex-wrap:wrap}
  .act button{font-family:var(--mono);font-size:11px;padding:6px 11px;border-radius:7px;cursor:pointer;
    border:1px solid var(--line);background:var(--panel2);color:var(--muted);transition:color .15s,border-color .15s}
  .act button:hover{color:var(--ink);border-color:#41493F}
  .act button.p{color:#04121A;background:linear-gradient(135deg,var(--cyan),var(--teal));border:none;font-weight:600}
  .act button.danger:hover{color:var(--terra);border-color:rgba(217,96,58,.5)}
  .empty{color:var(--muted2);text-align:center;padding:32px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px}
  #notice{border-radius:9px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
  #notice.ok{background:rgba(52,211,153,.10);border:1px solid rgba(52,211,153,.3);color:var(--green);display:block}
  #notice.err{background:rgba(217,96,58,.12);border:1px solid rgba(217,96,58,.3);color:var(--terra);display:block}
</style>
</head>
<body>
  <header>
    <div class="wrap nav">
      <div class="brand"><a href="/">CONSEILPREV</a><span class="tag">Cyber</span></div>
      <div class="spacer"></div>
      <nav class="links">
        <a href="/demo">Cockpit</a>
        <a href="/tendances">Tendances</a>
        <a href="#" id="logout">Déconnexion</a>
      </nav>
    </div>
  </header>

  <main class="wrap">
    <section class="page-head" style="padding-bottom:0">
      <span class="eyebrow"><span class="dot"></span>Administration</span>
      <h1>Comptes <span class="grad">utilisateurs</span>.</h1>
      <p class="lead" style="margin-top:12px">Approuvez les demandes d'accès, suspendez ou supprimez des comptes.</p>
    </section>

    <section style="padding:22px 0 56px">
      <div class="stats">
        <div class="stat" style="--sc:linear-gradient(90deg,var(--amber),var(--terra))"><div class="lbl">En attente</div><div class="val" id="kWait">—</div></div>
        <div class="stat" style="--sc:linear-gradient(90deg,var(--teal),var(--green))"><div class="lbl">Actifs</div><div class="val" id="kActive">—</div></div>
        <div class="stat" style="--sc:linear-gradient(90deg,var(--violet),var(--cyan))"><div class="lbl">Admins</div><div class="val" id="kAdmin">—</div></div>
        <div class="stat" style="--sc:linear-gradient(90deg,var(--cyan),var(--teal))"><div class="lbl">Total</div><div class="val" id="kTotal">—</div></div>
      </div>

      <div id="notice"></div>
      <div class="topbar">
        <div class="sec-title" style="margin:0">Liste des comptes</div>
        <button class="btn btn-s" id="refresh" type="button">↻ Actualiser</button>
      </div>
      <div class="tblwrap">
        <table>
          <thead><tr><th>Utilisateur</th><th>Statut</th><th>Rôle</th><th>Créé</th><th>Dernière connexion</th><th>Actions</th></tr></thead>
          <tbody id="rows"><tr><td colspan="6" class="empty">Chargement…</td></tr></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
  (function(){
    var rows=document.getElementById('rows'), notice=document.getElementById('notice');
    function esc(s){return (''+(s==null?'':s)).replace(/[&<>"]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c];});}
    function note(t,cls){notice.textContent=t;notice.className=cls;setTimeout(function(){notice.className='';notice.style.display='none';},4000);notice.style.display='block';}
    function fmt(ts){if(!ts)return '—';var d=new Date(ts);return d.toLocaleDateString('fr-FR')+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}
    function statusPill(u){
      if(!u.email_verified) return '<span class="pill wait">email non confirmé</span>';
      if(!u.approved) return '<span class="pill wait">en attente</span>';
      return '<span class="pill ok">actif</span>';
    }
    var myEmail='';
    function render(users){
      document.getElementById('kTotal').textContent=users.length;
      document.getElementById('kWait').textContent=users.filter(function(u){return u.email_verified&&!u.approved;}).length;
      document.getElementById('kActive').textContent=users.filter(function(u){return u.approved;}).length;
      document.getElementById('kAdmin').textContent=users.filter(function(u){return u.role==='admin';}).length;
      if(!users.length){rows.innerHTML='<tr><td colspan="6" class="empty">Aucun compte pour l\'instant.</td></tr>';return;}
      rows.innerHTML=users.map(function(u){
        var acts=[];
        if(u.email===myEmail){
          acts.push('<span class="sub">vous</span>');
        } else {
        if(u.email_verified&&!u.approved) acts.push('<button class="p" data-a="approve" data-e="'+esc(u.email)+'">Approuver</button>');
        if(u.approved) acts.push('<button data-a="suspend" data-e="'+esc(u.email)+'">Suspendre</button>');
        if(!u.approved&&!u.email_verified) acts.push('<button class="p" data-a="approve" data-e="'+esc(u.email)+'" title="Approuver sans attendre la confirmation email">Approuver</button>');
        if(u.role!=='admin') acts.push('<button data-a="make_admin" data-e="'+esc(u.email)+'">Promouvoir admin</button>');
        else acts.push('<button data-a="make_user" data-e="'+esc(u.email)+'">Rétrograder</button>');
        acts.push('<button class="danger" data-a="delete" data-e="'+esc(u.email)+'">Supprimer</button>');
        }
        return '<tr><td><div class="who">'+esc(u.name||'—')+'</div><div class="sub">'+esc(u.email)+(u.org?(' · '+esc(u.org)):'')+'</div></td>'
          +'<td>'+statusPill(u)+'</td>'
          +'<td>'+(u.role==='admin'?'<span class="pill adm">admin</span>':'<span class="pill">utilisateur</span>')+'</td>'
          +'<td class="sub">'+fmt(u.created_at)+'</td><td class="sub">'+fmt(u.last_login)+'</td>'
          +'<td><div class="act">'+acts.join('')+'</div></td></tr>';
      }).join('');
    }
    function load(){
      fetch('/api/auth/me').then(function(r){return r.json();}).catch(function(){return {};})
      .then(function(a){ myEmail=(a&&a.email)||'';
        return fetch('/api/admin/users').then(function(r){
          if(r.status===401){location.href='/connexion?next=/admin/comptes';return null;}
          if(r.status===403){rows.innerHTML='<tr><td colspan="6" class="empty">Accès réservé à l\'administrateur.</td></tr>';return null;}
          return r.json();
        });
      }).then(function(j){ if(j&&j.users) render(j.users); })
      .catch(function(){note('Erreur de chargement.','err');});
    }
    rows.addEventListener('click',function(e){
      var b=e.target.closest('button'); if(!b)return;
      var action=b.getAttribute('data-a'), email=b.getAttribute('data-e');
      if(action==='delete'&&!confirm('Supprimer définitivement le compte '+email+' ?'))return;
      if(action==='suspend'&&!confirm('Suspendre l\'accès de '+email+' ?'))return;
      var opts=action==='delete'?{method:'DELETE'}:{method:'PATCH',headers:{'content-type':'application/json'},body:JSON.stringify({action:action})};
      fetch('/api/admin/users/'+encodeURIComponent(email),opts)
        .then(function(r){return r.json().then(function(j){return {s:r.status,j:j};});})
        .then(function(o){ if(o.j.ok){note('Action effectuée.','ok');load();} else {note(o.j.error||'Erreur.','err');} })
        .catch(function(){note('Erreur réseau.','err');});
    });
    document.getElementById('refresh').addEventListener('click',load);
    document.getElementById('logout').addEventListener('click',function(e){e.preventDefault();
      fetch('/api/auth/logout',{method:'POST'}).then(function(){location.href='/connexion?deconnecte=1';});});
    load();
  })();
  </script>
</body>
</html>
